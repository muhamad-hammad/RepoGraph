<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src ${cspSource} data:; style-src ${cspSource} 'unsafe-inline'; script-src 'nonce-${nonce}'; font-src ${cspSource};"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="${styleUri}" />
    <title>Repo Graph</title>
  </head>
  <body>
    <div id="toolbar">
      <button type="button" id="refresh" title="Re-parse the repository">Refresh</button>
      <button type="button" id="expand-all" title="Expand every file node">Expand all</button>
      <button type="button" id="collapse-all" title="Collapse every file node">Collapse all</button>
      <label id="imports-toggle-wrap">
        <input type="checkbox" id="imports-toggle" checked />
        imports
      </label>
      <label
        id="calls-toggle-wrap"
        title="Naive call graph: callee names matched against repo symbols (same-file &gt; imported &gt; unique-global). Hints, not ground truth — misses method dispatch via self/this, higher-order/dynamic calls, and may match same-named symbols in other scopes."
      >
        <input type="checkbox" id="calls-toggle" />
        calls ⓘ
      </label>
      <input type="search" id="search" placeholder="search nodes…" title="Highlight nodes whose name contains this text" />
      <span id="status"></span>
    </div>
    <nav id="breadcrumb" aria-label="Selected node path"></nav>
    <div id="cy"></div>
    <aside id="snippet" aria-label="Source snippet" hidden>
      <div id="snippet-head">
        <span id="snippet-title"></span>
        <button type="button" id="snippet-close" title="Close snippet">✕</button>
      </div>
      <pre id="snippet-code"><code></code></pre>
    </aside>
    <script nonce="${nonce}" src="${scriptUri}"></script>
  </body>
</html>
